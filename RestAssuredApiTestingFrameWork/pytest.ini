[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --strict-config
markers =
    valid: valid API contract and behavior tests
    invalid: negative API contract and validation tests
    smoke: CI smoke tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(name)s %(message)s
